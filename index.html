<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Colombo | Portfolio 2026</title>
    <meta property="og:title" content="David Colombo | Portfolio 2026">
    <meta property="og:description" content="Portfolio de David Colombo - Projets Visionnaires et Développeur Web3.">
    <meta property="og:image" content="https://portfolio-2026-alpha-nine.vercel.app/assets/afficheDSMMI1_David-colombo.png">
    <meta property="og:url" content="https://portfolio-2026-alpha-nine.vercel.app/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="David Colombo | Portfolio 2026">
    <meta name="twitter:description" content="Portfolio de David Colombo - Projets Visionnaires et Développeur Web3.">
    <meta name="twitter:image" content="https://portfolio-2026-alpha-nine.vercel.app/assets/afficheDSMMI1_David-colombo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <section class="hero">
            <header class="hero-badge">
                <span class="badge">Portfolio 2026</span>
                <span class="version">V 2.0.0</span>
            </header>
            <h1 class="hero-title">David<br><span>Colombo</span></h1>
            <p class="hero-subtitle">Creative Technologist • Web3 Architect • 3D Designer</p>
            <div class="hero-actions">
                <a href="projets.html" class="btn-neon">Explorer les projets</a>
                <a href="contact.html" class="btn-neon outline">Me contacter</a>
                <button onclick="openCvModal()" class="btn-neon outline" title="Ouvrir le CV">Voir le CV</button>
            </div>
        </section>
    </div>

    <!-- Modale pour le CV -->
    <div id="cv-modal" class="modal-overlay">
        <div class="modal-content" style="height: 90vh; max-width: 1000px; display: flex; flex-direction: column;">
            <button class="modal-close" onclick="closeCvModal()">&times;</button>
            <iframe src="assets/CV%20MMI.pdf" style="flex-grow: 1; width: 100%; border: none; border-radius: 20px;" title="CV David Colombo"></iframe>
            <div style="margin-top: 20px; text-align: center;">
                <a href="assets/CV MMI.pdf" download="CV_David_Colombo.pdf" class="btn-neon" style="padding: 15px 30px; font-size: 8px;">Télécharger le CV PDF</a>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <a href="index.html" class="nav-link active">Accueil</a>
        <a href="projets.html" class="nav-link">Projets</a>
        <a href="about.html" class="nav-link">À Propos</a>
        <a href="contact.html" class="nav-link">Contact</a>
    </nav>
    <script src="js/main.js"></script>
    <script>
        function openCvModal() {
            document.getElementById('cv-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeCvModal() {
            document.getElementById('cv-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        // Fermeture en cliquant à l'extérieur
        document.getElementById('cv-modal').addEventListener('click', function(e) {
            if (e.target === this) closeCvModal();
        });
    </script>
</body>
</html>
